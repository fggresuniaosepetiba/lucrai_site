services:
  postgres:
    image: postgres:16-alpine
    container_name: lucrai-db
    environment:
      POSTGRES_DB: lucrai
      POSTGRES_USER: lucrai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lucrai -d lucrai"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/Lucrai.API/Dockerfile
    container_name: lucrai-api
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=lucrai;Username=lucrai;Password=${POSTGRES_PASSWORD}
      Jwt__Key: dev-secret-key-lucrai-at-least-32-chars!!
      Jwt__Issuer: lucrai-api
      Jwt__Audience: lucrai-frontend
      Cors__Origins: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
